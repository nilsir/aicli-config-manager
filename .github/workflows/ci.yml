name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          bun install --cwd web

      - name: Type check (frontend)
        run: bun run --cwd web tsc -b --noEmit

      - name: Build frontend
        run: bun run build

      - name: Run tests
        run: bun test
